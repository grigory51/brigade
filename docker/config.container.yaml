# Конфигурация brigade по умолчанию для контейнерного образа. Любое значение
# перекрывается переменной окружения с префиксом BRIGADE_ (вложенность — через
# двойное подчёркивание): BRIGADE_JWT__SECRET и т.д.
#
# Docker-сессии доступны, если контейнеру проброшен docker-сокет хоста
# (-v /var/run/docker.sock:/var/run/docker.sock). Режим — свойство сессии.

addr: ":8080"
sqlite_path: "/data/brigade.db"

jwt:
  # Заглушка: обязательно перекройте BRIGADE_JWT__SECRET.
  secret: "insecure-change-me"
  access_ttl: "15m"
  refresh_ttl: "720h"

seed:
  username: "admin"
  password: "admin"

# В docker-режиме сессий смонтируйте workspace по одинаковому пути внутри и
# снаружи контейнера и перекройте BRIGADE_WORK_DIR этим путём.
work_dir: "/data/workspace"

claude_code_oauth_token: ""

preview:
  enabled: true
  domain: "localhost"
  scheme: "http"
  external_port: 0

tls:
  addr: ""
  cert_file: ""
  key_file: ""
