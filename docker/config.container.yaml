# Конфигурация brigade по умолчанию для контейнерного образа. Любое значение
# перекрывается переменной окружения с префиксом BRIGADE_ (вложенность — через
# двойное подчёркивание): BRIGADE_MODE, BRIGADE_JWT__SECRET и т.д.
#
# mode=docker требует проброса docker-сокета хоста
# (-v /var/run/docker.sock:/var/run/docker.sock).

mode: local
addr: ":8080"
sqlite_path: "/data/brigade.db"

jwt:
  # Заглушка: обязательно перекройте BRIGADE_JWT__SECRET.
  secret: "insecure-change-me"
  access_ttl: "15m"
  refresh_ttl: "720h"

seed:
  username: "admin"
  password: "admin"

# В docker-режиме сессий смонтируйте workspace по одинаковому пути внутри и
# снаружи контейнера и перекройте BRIGADE_WORK_DIR этим путём.
work_dir: "/data/workspace"

# Потолок на число одновременных docker-контейнеров сессий (ACP — на сессию,
# docker-CLI — на пользователя). Сверх лимита создание сессии отклоняется.
# Не задано → 16; отрицательное — без лимита. Env: BRIGADE_MAX_CONTAINERS.
max_containers: 16

# Базовый каталог per-user ~/.claude (docker-режим). Смонтируйте его по одинаковому
# пути внутри и снаружи контейнера (как workspace) и перекройте BRIGADE_CLAUDE_HOME_DIR.
claude_home_dir: "/data/claude"

preview:
  enabled: true
  domain: "localhost"
  scheme: "http"
  external_port: 0

tls:
  addr: ""
  cert_file: ""
  key_file: ""
