# Пример конфигурации brigade. Скопируйте в config.yaml и поправьте значения.
# Любое поле перекрывается переменной окружения с префиксом BRIGADE_ и разделителем
# уровней через двойное подчёркивание: например BRIGADE_JWT__SECRET, BRIGADE_ADDR.

# Режим спавна агентов инстанса: local — процесс на хосте в pty; docker — отдельный
# контейнер на сессию. Это свойство сервера, а не выбор пользователя: все сессии
# наследуют режим. docker требует доступного docker-демона. Дефолт — local.
mode: local

# Адрес HTTP-сервера (ConnectRPC + WebSocket + встроенный фронтенд).
addr: ":8080"

# Путь к файлу SQLite. Создаётся при первом запуске, миграции прогоняются автоматически.
sqlite_path: "./brigade.db"

jwt:
  # Ключ подписи JWT. В проде задавайте через env (BRIGADE_JWT__SECRET), не храните в yaml.
  secret: "change-me-in-production"
  # TTL access-токена держим коротким; обновление — по refresh-токену.
  access_ttl: "15m"
  refresh_ttl: "720h"

# Сид-пользователь создаётся при первом запуске, если таблица users пуста.
seed:
  username: "admin"
  password: "admin"

# Корневая рабочая директория агентов. В docker-режиме её подпапки bind-mount'ятся
# в контейнеры сессий.
work_dir: "./workspace"

# Потолок на число одновременных docker-контейнеров: ACP — контейнер на сессию,
# docker-CLI — общий контейнер на пользователя. Создание сессии сверх лимита
# отклоняется (RESOURCE_EXHAUSTED). Не задано → 16; отрицательное — без лимита.
# Только docker-режим.
max_containers: 16

# Базовый каталог per-user home на хосте (только docker-режим). brigade создаёт
# подкаталог <claude_home_dir>/<userID> и bind-mount'ит его в /home/agent целиком во
# все контейнеры пользователя. Общими per-user становятся: состояние Claude (~/.claude,
# ~/.claude.json — авторизация `/login` делается один раз) и рабочие файлы
# (~/workspace). Между разными пользователями home не пересекается. Пусто — фича
# выключена (эфемерный home / named volume по дереву сессий).
# Подписочный токен Claude больше НЕ глобальный: задаётся каждым пользователем в UI
# (Настройки → Claude).
claude_home_dir: ""

# Публикация dev-серверов сессий через встроенный L7-прокси: запрос на
# {sessionId}-{port}.{domain} проксируется к порту сессии (local — 127.0.0.1,
# docker — IP контейнера). Подробности — docs/preview.md.
preview:
  enabled: true
  # Режим адресации preview:
  #   subdomain — {sessionId}-{port}.{domain} (требует wildcard-DNS);
  #   cookie    — один хост cookie_host, выбор через cookie (для сред без wildcard,
  #               например netbird expose). Ссылка вида https://cookie_host/?id=<id>-<port>
  #               ставит cookie и редиректит; дальше весь хост проксируется к dev-серверу.
  mode: "subdomain"
  # Базовый домен preview-поддоменов (mode=subdomain). "localhost" — для разработки
  # (Chrome/Firefox резолвят *.localhost сами); в проде — домен с wildcard-DNS.
  domain: "localhost"
  # Хост cookie-режима целиком (mode=cookie), напр. "preview.brigade.example.com".
  cookie_host: ""
  # Схема публичных preview-URL. https предполагает TLS: встроенный (секция tls) или
  # внешний терминатор.
  scheme: "http"
  # Порт в публичных URL, если отличается от порта прослушивания (например, 443 при
  # внешнем TLS-терминаторе). 0 — порт из addr (или tls.addr при scheme=https).
  external_port: 0

# Встроенная TLS-терминация (UI, API и preview-поддомены). Пустой addr — выключено.
# Сертификат должен покрывать домен и wildcard preview-поддоменов
# (SAN: domain + *.domain); wildcard выдаётся только по DNS-01 (certbot).
tls:
  addr: ""
  cert_file: ""
  key_file: ""
