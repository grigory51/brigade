syntax = "proto3";

package brigade.v1;

// Пустой ответ для методов без полезной нагрузки (например, Logout).
message Empty {}

// Пользователь системы. Пароль не передаётся клиенту.
message User {
  string id = 1;
  string username = 2;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

// access_token — короткоживущий JWT; refresh_token — для обновления без повторного логина.
// Для web access-токен также выставляется httpOnly-cookie, mobile использует Bearer.
message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
}

// ClaudeSettings — состояние Claude-настроек пользователя. Само значение токена
// наружу НЕ отдаётся никогда: только флаг «задан ли токен».
message ClaudeSettings {
  bool token_set = 1;
}

// SetClaudeTokenRequest — установка/очистка подписочного токена Claude Code
// пользователя. Пустой token очищает настройку.
message SetClaudeTokenRequest {
  string token = 1;
}

// MemorySettings — состояние настроек личной памяти пользователя: remote (его собственный
// git-репозиторий заметок). Доступ к git@-remote идёт по SSH-ключу агента (см. SSHSettings),
// отдельный ключ памяти не задаётся.
message MemorySettings {
  string remote = 1;
}

// SetMemorySettingsRequest — установка git-remote личной памяти (пустой отключает память).
message SetMemorySettingsRequest {
  string remote = 1;
}

// NtfySettings — состояние настроек персональных push-уведомлений через ntfy. server и
// topic показываются в UI; значение токена наружу НЕ отдаётся — только флаг token_set.
// events — включённые пользователем события (напр. "turn_end", "error").
message NtfySettings {
  string server = 1;
  string topic = 2;
  bool token_set = 3;
  repeated string events = 4;
}

// SetNtfySettingsRequest — установка настроек ntfy. server/topic/events перезаписываются
// всегда (пустой topic отключает уведомления). token: пустой СОХРАНЯЕТ прежний (правка
// server/topic не стирает токен); задать новый — прислать непустой.
message SetNtfySettingsRequest {
  string server = 1;
  string topic = 2;
  string token = 3;
  repeated string events = 4;
}

// SSHSettings — публичная часть per-user SSH-ключа агента. Приватный ключ генерируется и
// хранится на сервере (зашифрован) и подкладывается в контейнер сессии; наружу отдаётся
// только публичный ключ — его пользователь добавляет в GitHub (SSH keys / deploy key),
// чтобы агент мог пушить.
message SSHSettings {
  string public_key = 1;
}

// AuthService — логин/пароль с JWT (TTL), refresh-токеном и per-user настройками Claude.
service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc Refresh(RefreshRequest) returns (RefreshResponse) {}
  // Me возвращает текущего пользователя по access-токену (из cookie или Bearer).
  rpc Me(Empty) returns (User) {}
  rpc Logout(Empty) returns (Empty) {}
  // GetClaudeSettings возвращает состояние Claude-настроек пользователя (только флаг
  // token_set — значение токена не раскрывается).
  rpc GetClaudeSettings(Empty) returns (ClaudeSettings) {}
  // SetClaudeToken задаёт (или очищает пустым значением) подписочный токен Claude
  // пользователя. Возвращает обновлённое состояние (token_set).
  rpc SetClaudeToken(SetClaudeTokenRequest) returns (ClaudeSettings) {}
  // GetMemorySettings возвращает настройки личной памяти пользователя (git-remote).
  rpc GetMemorySettings(Empty) returns (MemorySettings) {}
  // SetMemorySettings задаёт git-remote личной памяти. Возвращает обновлённое состояние.
  rpc SetMemorySettings(SetMemorySettingsRequest) returns (MemorySettings) {}
  // GetNtfySettings возвращает настройки push-уведомлений пользователя (server/topic/events
  // + флаг token_set; значение токена не раскрывается).
  rpc GetNtfySettings(Empty) returns (NtfySettings) {}
  // SetNtfySettings задаёт server/topic/token/events персональных ntfy-уведомлений.
  // Возвращает обновлённое состояние.
  rpc SetNtfySettings(SetNtfySettingsRequest) returns (NtfySettings) {}
  // GetSSHSettings возвращает публичный SSH-ключ агента пользователя, генерируя пару при
  // первом обращении (приватный ключ наружу не отдаётся).
  rpc GetSSHSettings(Empty) returns (SSHSettings) {}
  // RegenerateSSHKey перевыпускает пару SSH-ключей агента (старый публичный ключ в GitHub
  // после этого недействителен). Возвращает новый публичный ключ.
  rpc RegenerateSSHKey(Empty) returns (SSHSettings) {}
}
