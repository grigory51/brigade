<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- brigade: терминальный prompt + эшелон из трёх строк — строй агентов. -->
  <rect width="256" height="256" rx="56" fill="#15191f"/>
  <!-- Шеврон prompt'а -->
  <path d="M58 86 L102 128 L58 170"
        fill="none" stroke="#c96442" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Три агента в строю: ведущий и два эшелоном за ним -->
  <rect x="126" y="86" width="74" height="20" rx="10" fill="#c96442"/>
  <rect x="138" y="118" width="62" height="20" rx="10" fill="#b0563a"/>
  <rect x="150" y="150" width="50" height="20" rx="10" fill="#7d4029"/>
</svg>
