name: release

# На каждый semver-тег v* (его пушит `make release`) создаём GitHub Release с
# авто-сгенерированными заметками и прикладываем собранный единый бинарь. Публикацию
# docker-образов делает отдельный workflow docker.yml (тот же триггер).
on:
  push:
    tags: ["v*"]

# contents: write нужен GITHUB_TOKEN для создания Release и загрузки артефактов.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # полная история — для авто-заметок «что изменилось с прошлого тега».
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Полная сборка единого бинаря (web → go:embed → go build) — то же, что `make build`.
      - name: build
        run: make build

      # Упаковываем бинарь с фронтендом внутрь (linux/amd64 — цель деплоя). Корневой
      # `make build` делегирует в backend/, поэтому артефакт — backend/bin/brigade.
      - name: package
        run: tar -czf "brigade-${{ github.ref_name }}-linux-amd64.tar.gz" -C backend/bin brigade

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          # Заметки собираются автоматически из коммитов и merged-PR с прошлого тега.
          generate_release_notes: true
          # Теги с суффиксом (v1.2.3-rc1) помечаются пре-релизом.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: brigade-${{ github.ref_name }}-linux-amd64.tar.gz
