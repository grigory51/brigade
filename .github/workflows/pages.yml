name: pages

# Деплой лендинга (site/) на GitHub Pages. Статика отдаётся как есть — сборки нет.
# Публикуется ТОЛЬКО на релизных тегах v* (в такт docker-CI), а не на каждый пуш в main —
# лендинг обновляется вместе с релизом. Ручной запуск — через workflow_dispatch.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Один активный деплой Pages за раз; новый пуш отменяет незавершённый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
