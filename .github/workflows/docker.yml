name: docker

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # release-job создаёт GitHub Release
  packages: write # push образов в ghcr

jobs:
  push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: brigade
            context: .
            dockerfile: Dockerfile
          - image: brigade-agent
            context: .
            dockerfile: docker/claude-agent/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          # Образы публикуются только на теги v* (релизы). latest указывает на
          # последний стабильный semver-тег.
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Версия для показа в UI (web-стадия brigade-образа читает VERSION build-arg; git в
          # образе нет). Тег с префиксом v — как у `git describe`. Для brigade-agent неиспользуем.
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  # GitHub Release создаём только ПОСЛЕ успешной публикации образов (needs: push):
  # релиз не должен появляться, если docker-образ не запушился. Заметки —
  # авто из коммитов/PR с прошлого тега; прикладываем собранный единый бинарь.
  release:
    needs: push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # полная история — для авто-заметок «что изменилось с прошлого тега».
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      # Полная сборка единого бинаря (web → go:embed → go build) — то же, что `make build`.
      - name: build
        run: make build
      # Корневой `make build` делегирует в backend/, поэтому артефакт — backend/bin/brigade.
      - name: package
        run: tar -czf "brigade-${{ github.ref_name }}-linux-amd64.tar.gz" -C backend/bin brigade
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Теги с суффиксом (v1.2.3-rc1) помечаются пре-релизом.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: brigade-${{ github.ref_name }}-linux-amd64.tar.gz
